name: 'ecommerce_dw'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_dw'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
docs-paths: ["docs"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_dw:
    staging:
      +schema: STAGING
      +materialized: view          # staging models are cheap views — no storage cost
    marts:
      +schema: ANALYTICS
      +materialized: table         # mart models are persisted tables for BI performance
      +post-hook:
        - "GRANT SELECT ON {{ this }} TO ROLE ANALYST_ROLE"
